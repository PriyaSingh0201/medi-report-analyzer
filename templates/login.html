<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dooper Report Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <script>
        // Inline script to prevent theme flash
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
            document.addEventListener('DOMContentLoaded', () => {
                document.body.classList.add('dark-mode');
            });
        }
    </script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <img src="{{ url_for('static', filename='images/dooper-logo.png') }}" alt="Dooper Logo" class="auth-logo-img">
                <p class="brand-tagline">AI Medical Report Analyzer</p>
                <p class="auth-sub">Log in to view and analyze your reports</p>
            </div>
            
            <div id="error-alert" class="error-message">
                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                </svg>
                <span id="error-text">Invalid email or password</span>
            </div>

            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="input-control" placeholder="name@domain.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="input-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" id="submit-btn" class="btn btn-primary auth-btn">Log In</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="{{ url_for('auth.register_page') }}">Register</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
